name: Build Windows .exe

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r carvix_desktop/requirements.txt

      - name: Build .exe with PyInstaller
        run: |
          cd carvix_desktop
          pyinstaller --noconfirm --onefile --windowed --name CarvixApp main.py

      - name: Package with .env
        run: |
          cd carvix_desktop
          copy .env.example dist\.env
          powershell Compress-Archive -Path dist\CarvixApp.exe, dist\.env -DestinationPath dist\CarvixApp-windows.zip

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: CarvixApp-exe
          path: carvix_desktop/dist/CarvixApp.exe

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: CarvixApp-windows-zip
          path: carvix_desktop/dist/CarvixApp-windows.zip
